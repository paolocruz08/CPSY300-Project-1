name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install pandas matplotlib seaborn azure-storage-blob
    
    - name: Run data analysis
      run: |
        python data_analysis.py
    
    - name: Build Docker image
      run: |
        docker build -t diet-analysis .
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push to Docker Hub
      run: |
        docker tag diet-analysis ${{ secrets.DOCKER_USERNAME }}/diet-analysis
        docker push ${{ secrets.DOCKER_USERNAME }}/diet-analysis
